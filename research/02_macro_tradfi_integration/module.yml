module_id: 02_macro_tradfi_integration
title: Macro and TradFi Integration
research_question: How do crypto exposures to equities, volatility, rates, the dollar,
  gold, and credit vary across calendars and periods?
research_questions:
- How do equity, volatility, dollar, rates, and gold blocks contribute to contemporaneous
  crypto exposure models?
- Are later-sample exposure differences robust to frequency, multicollinearity, FDR,
  and ridge sensitivity?
