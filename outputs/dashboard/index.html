<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Crypto Market Factor Lab Dashboard</title>
<style>
body{margin:0;background:#FAFAF7;color:#111827;font-family:Inter,Segoe UI,Arial,sans-serif}
header{padding:32px 5vw 18px;border-bottom:1px solid #E5E7EB;background:#FFFFFF}
h1{margin:0 0 8px;font-size:32px}
p{margin:0;color:#6B7280;max-width:980px;line-height:1.5}
main{display:grid;grid-template-columns:repeat(auto-fit,minmax(520px,1fr));gap:22px;padding:28px 5vw}
.card{background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;padding:16px}
.card h2{font-size:15px;color:#6B7280;margin:0 0 12px;text-transform:uppercase;letter-spacing:.04em}
img{width:100%;height:auto;border-radius:8px;border:1px solid #E5E7EB}
</style>
</head>
<body>
<header>
<h1>Crypto Market Factor Lab</h1>
<p>Static dashboard of public canonical figures.</p>
</header>
<main>
<section class='card'><h2>F01 mvrv sensitivity by regime v2</h2><img src='../figures/F01_mvrv_sensitivity_by_regime_v2.png' alt='F01_mvrv_sensitivity_by_regime_v2.png'></section>
<section class='card'><h2>F02 same support ablation</h2><img src='../figures/F02_same_support_ablation.png' alt='F02_same_support_ablation.png'></section>
<section class='card'><h2>F03 btc ex mvrv strength</h2><img src='../figures/F03_btc_ex_mvrv_strength.png' alt='F03_btc_ex_mvrv_strength.png'></section>
<section class='card'><h2>F04 etf flow lead lag</h2><img src='../figures/F04_etf_flow_lead_lag.png' alt='F04_etf_flow_lead_lag.png'></section>
<section class='card'><h2>F05 core correlation matrix</h2><img src='../figures/F05_core_correlation_matrix.png' alt='F05_core_correlation_matrix.png'></section>
<section class='card'><h2>F06 rolling correlations</h2><img src='../figures/F06_rolling_correlations.png' alt='F06_rolling_correlations.png'></section>
<section class='card'><h2>F07 feature strength heatmap</h2><img src='../figures/F07_feature_strength_heatmap.png' alt='F07_feature_strength_heatmap.png'></section>
<section class='card'><h2>F08 connectedness robustness</h2><img src='../figures/F08_connectedness_robustness.png' alt='F08_connectedness_robustness.png'></section>
</main>
</body>
</html>
