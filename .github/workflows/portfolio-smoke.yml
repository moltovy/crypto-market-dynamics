name: Portfolio Smoke

on:
  workflow_dispatch:
    inputs:
      release:
        description: Portfolio packet to regenerate
        required: true
        default: both
        type: choice
        options:
          - v2_1
          - v2_2
          - both

jobs:
  portfolio-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies with uv
        run: uv sync --all-extras

      - name: Build Portfolio v2.1
        if: ${{ inputs.release == 'v2_1' || inputs.release == 'both' }}
        run: uv run python scripts/run_portfolio_v2_1_pipeline.py

      - name: Build Portfolio v2.2
        if: ${{ inputs.release == 'v2_2' || inputs.release == 'both' }}
        run: uv run python scripts/run_portfolio_v2_2_pipeline.py

      - name: Confirm Data is untouched
        run: |
          if [ -n "$(git status --short -- Data)" ]; then
            git status --short -- Data
            exit 1
          fi

      - name: Upload regenerated portfolio packets
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-smoke-${{ inputs.release }}
          path: |
            reports/portfolio_v2_1
            reports/portfolio_v2_2
