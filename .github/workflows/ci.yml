name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies with uv
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check src/cqresearch scripts tests

      - name: Ruff format
        run: uv run ruff format --check src/cqresearch scripts tests

      - name: Mypy
        run: uv run mypy src/cqresearch

      - name: Public smoke tests against committed semantic outputs
        run: uv run pytest -q

      - name: Public surface guardrails
        run: uv run python scripts/check_public_surface.py

      - name: Canonical offline build when local provider data is available
        if: ${{ hashFiles('data_local/raw/**') != '' }}
        run: |
          uv run python scripts/run_all.py
          uv run python scripts/build_public_figures.py

      - name: Pytest against freshly generated outputs when local provider data is available
        if: ${{ hashFiles('data_local/raw/**') != '' }}
        run: uv run pytest -q

      - name: Public surface guardrails after local rebuild
        if: ${{ hashFiles('data_local/raw/**') != '' }}
        run: uv run python scripts/check_public_surface.py

      - name: Deterministic semantic rebuild when local provider data is available
        if: ${{ hashFiles('data_local/raw/**') != '' }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json

          root = Path(".")
          excluded = {Path("outputs/manifest.json")}

          def digest() -> dict[str, str]:
              result = {}
              for path in sorted(Path("outputs").rglob("*")):
                  if not path.is_file():
                      continue
                  rel = path.relative_to(root)
                  if rel in excluded:
                      continue
                  result[rel.as_posix()] = hashlib.sha256(path.read_bytes()).hexdigest()
              return result

          Path("/tmp/cmd_digest_before.json").write_text(json.dumps(digest(), sort_keys=True))
          PY
          uv run python scripts/run_all.py
          uv run python scripts/build_public_figures.py
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import sys

          root = Path(".")
          excluded = {Path("outputs/manifest.json")}

          def digest() -> dict[str, str]:
              result = {}
              for path in sorted(Path("outputs").rglob("*")):
                  if not path.is_file():
                      continue
                  rel = path.relative_to(root)
                  if rel in excluded:
                      continue
                  result[rel.as_posix()] = hashlib.sha256(path.read_bytes()).hexdigest()
              return result

          before = json.loads(Path("/tmp/cmd_digest_before.json").read_text())
          after = digest()
          if before != after:
              changed = sorted(set(before) ^ set(after) | {k for k in before if before.get(k) != after.get(k)})
              print("Non-deterministic generated outputs:", changed[:100])
              sys.exit(1)
          PY

      - name: Generated artifact diff gate when local provider data is available
        if: ${{ hashFiles('data_local/raw/**') != '' }}
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          allowed_prefixes = ("outputs/",)

          result = subprocess.run(["git", "status", "--short"], capture_output=True, text=True, check=True)
          unexpected = []
          for line in result.stdout.splitlines():
              if not line:
                  continue
              path = line[3:].strip()
              if " -> " in path:
                  path = path.rsplit(" -> ", maxsplit=1)[-1]
              if path.startswith(allowed_prefixes):
                  continue
              unexpected.append(line)

          if unexpected:
              print("Unexpected build mutations:")
              print("\n".join(unexpected))
              sys.exit(1)
          print("Only generated public artifacts changed after local build/determinism gate.")
          PY
