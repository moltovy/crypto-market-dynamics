name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies with uv
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check src/cqresearch scripts tests

      - name: Mypy
        run: uv run mypy src/cqresearch

      - name: Canonical offline build
        run: uv run python scripts/run_all.py

      - name: Pytest against freshly generated outputs
        run: uv run pytest

      - name: Public surface guardrails
        run: uv run python scripts/check_public_surface.py

      - name: Deterministic semantic rebuild
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json

          root = Path(".")
          excluded = {Path("outputs/manifest.json")}

          def digest() -> dict[str, str]:
              files = []
              for base in [Path("Data"), Path("outputs"), Path("reports/panels")]:
                  if base.exists():
                      files.extend(path for path in base.rglob("*") if path.is_file())
              result = {}
              for path in sorted(files):
                  rel = path.relative_to(root)
                  if rel in excluded:
                      continue
                  result[rel.as_posix()] = hashlib.sha256(path.read_bytes()).hexdigest()
              return result

          before = digest()
          Path("/tmp/cmd_digest_before.json").write_text(json.dumps(before, sort_keys=True))
          PY
          uv run python scripts/run_all.py
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import sys

          root = Path(".")
          excluded = {Path("outputs/manifest.json")}

          def digest() -> dict[str, str]:
              files = []
              for base in [Path("Data"), Path("outputs"), Path("reports/panels")]:
                  if base.exists():
                      files.extend(path for path in base.rglob("*") if path.is_file())
              result = {}
              for path in sorted(files):
                  rel = path.relative_to(root)
                  if rel in excluded:
                      continue
                  result[rel.as_posix()] = hashlib.sha256(path.read_bytes()).hexdigest()
              return result

          after = digest()
          state_path = Path("/tmp/cmd_digest_before.json")
          if state_path.exists():
              before = json.loads(state_path.read_text())
          else:
              before = after
          if before != after:
              changed = sorted(set(before) ^ set(after) | {k for k in before if before.get(k) != after.get(k)})
              print("Non-deterministic generated outputs:", changed[:100])
              sys.exit(1)
          PY

      - name: Generated artifact diff gate
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          allowed_exact = {
              "Data/MASTER_DATA.csv",
              "Data/MASTER_DATA.md",
              "Data/MASTER_DATA.txt",
          }
          allowed_prefixes = ("outputs/", "reports/panels/")

          result = subprocess.run(["git", "status", "--short"], capture_output=True, text=True, check=True)
          unexpected = []
          for line in result.stdout.splitlines():
              if not line:
                  continue
              path = line[3:].strip()
              if " -> " in path:
                  path = path.rsplit(" -> ", maxsplit=1)[-1]
              if path in allowed_exact or path.startswith(allowed_prefixes):
                  continue
              unexpected.append(line)

          if unexpected:
              print("Unexpected build mutations:")
              print("\n".join(unexpected))
              sys.exit(1)
          print("Only generated artifacts changed after build/determinism gate.")
          PY
