name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies with uv
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check src/cqresearch scripts tests

      - name: Mypy
        run: uv run mypy src/cqresearch

      - name: Pytest
        run: uv run pytest

      - name: Canonical offline build
        run: uv run python scripts/run_all.py

      - name: Public surface guardrails
        run: uv run python scripts/check_public_surface.py
