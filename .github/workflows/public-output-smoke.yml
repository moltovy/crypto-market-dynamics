name: Public Research Smoke

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  public-research-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies with uv
        run: uv sync --all-extras

      - name: Public surface guardrails
        run: uv run python scripts/check_research_surface.py --module all

      - name: Upload canonical research surface
        uses: actions/upload-artifact@v4
        with:
          name: canonical-research
          path: research
