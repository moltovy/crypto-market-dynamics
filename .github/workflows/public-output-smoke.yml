name: Public Output Smoke

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  public-output-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies with uv
        run: uv sync --all-extras

      - name: Export canonical outputs
        run: uv run python scripts/run_all.py

      - name: Confirm Data is untouched
        run: |
          if [ -n "$(git status --short -- Data)" ]; then
            git status --short -- Data
            exit 1
          fi

      - name: Upload canonical outputs
        uses: actions/upload-artifact@v4
        with:
          name: canonical-outputs
          path: outputs
