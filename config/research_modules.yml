modules:
- module_id: 00_data_measurement_foundation
  title: Data and Measurement Foundation
  research_question: What data, assets, units, timing, coverage, identity, and release-risk constraints govern later empirical claims?
  status: required
- module_id: 01_cross_asset_dependence_regimes
  title: Cross-Asset Dependence and Regimes
  research_question: How do crypto and TradFi return dependence, common-factor share, lower-tail co-exceedance, and regimes vary across matched samples?
  status: required
- module_id: 02_macro_tradfi_integration
  title: Macro and TradFi Integration
  research_question: How do crypto exposures to equities, volatility, rates, the dollar, gold, and credit vary across calendars and periods?
  status: required
- module_id: 03_derivatives_leverage_liquidations
  title: Derivatives, Leverage, and Liquidations
  research_question: Where do leverage, funding, open-interest scaling, and liquidation stress appear in volatility and tail outcomes?
  status: required
- module_id: 04_etf_institutional_flows
  title: ETF and Institutional Flows
  research_question: How do ETF flow intensity, timing, lag response, and shock/placebo diagnostics line up with crypto outcomes?
  status: required
- module_id: 05_stablecoin_defi_liquidity
  title: Stablecoin and DeFi Liquidity State
  research_question: What do stablecoin supply and DeFi TVL proxies say about liquidity-state associations after unit and valuation audits?
  status: required
- module_id: 06_onchain_valuation_holder_behavior
  title: On-Chain Valuation and Holder Behavior
  research_question: Which on-chain valuation and holder-state measures are diagnostics versus admissible lagged state variables?
  status: required
- module_id: 07_chain_fundamentals_sector_dynamics
  title: Chain Fundamentals and Sector Dynamics
  research_question: Which chain-level activity, sector, and point-in-time state measures have enough coverage and definition clarity for descriptive panel analysis?
  status: required
- module_id: 08_relative_asset_risk_factor_structure
  title: Relative Asset Risk and Factor Structure
  research_question: How do selected crypto assets compare on matched-window risk, downside beta, expected shortfall, and common-versus-idiosyncratic factor structure?
  status: required
- module_id: 09_event_stress_cross_module_synthesis
  title: Event Stress and Cross-Module Synthesis
  research_question: Which event-window, stress-state, and cross-module findings remain strongest after comparing sample, method, uncertainty, measurement risk, and limitations?
  status: required
