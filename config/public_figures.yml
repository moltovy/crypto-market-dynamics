figures:
- figure_id: mvrv_mechanics
  filename: outputs/figures/public/01_mvrv_mechanics.png
  status: public
  research_question: How mechanically linked is MVRV to BTC returns?
  source_tables: outputs/tables/mvrv_identity_points.csv; outputs/tables/mvrv_regime_outcomes.csv
  chart_type: generated
  units: see axes
  caption: How mechanically linked is MVRV to BTC returns?
