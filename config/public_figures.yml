figures:
- figure_id: cross_asset_dependence_regimes
  filename: research/01_cross_asset_dependence_regimes/figures/01_cross_asset_clustered_correlation.png
  status: public
  research_question: How broad is realized crypto and macro dependence across matched assets?
  source_tables: research/01_cross_asset_dependence_regimes/tables/pearson_correlation_matrix.csv; research/01_cross_asset_dependence_regimes/tables/pca_variance_share.csv
  chart_type: clustered_correlation_heatmap
  units: daily return/change correlations
  caption: Common crypto dependence is broad on the matched selected-major panel.
  caveat: Current-cohort selected-major daily data is survivorship-biased.
  svg_required: true
  readme_section: selected-analytical-results
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: tradfi_exposure_shift
  filename: research/02_macro_tradfi_integration/figures/02_tradfi_exposure_shift.png
  status: public
  research_question: How did equity co-movement change across periods?
  source_tables: research/02_macro_tradfi_integration/tables/block_delta_r2.csv; research/02_macro_tradfi_integration/tables/rolling_tradfi_exposures.csv
  chart_type: coefficient_and_block_contribution
  units: delta R-squared and rolling exposure summaries
  caption: Later-sample equity co-movement is higher for BTC and ETH.
  caveat: Period comparison, not ETF-effect identification.
  svg_required: true
  readme_section: selected-analytical-results
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: leverage_tail_stress
  filename: research/03_derivatives_leverage_liquidations/figures/03_leverage_tail_stress.png
  status: public
  research_question: Where do lagged leverage states show up in tail stress?
  source_tables: research/03_derivatives_leverage_liquidations/tables/leverage_tail_risk_summary.csv; research/03_derivatives_leverage_liquidations/tables/tail_risk_models.csv
  chart_type: state_conditioned_tail_risk
  units: tail-day rates and volatility
  caption: Leverage states are stress diagnostics.
  caveat: No liquidation initiation-cause claim.
  svg_required: true
  readme_section: selected-analytical-results
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: etf_lag_response
  filename: research/04_etf_institutional_flows/figures/04_etf_lag_response.png
  status: public
  research_question: How do ETF flow-return associations vary over lags 0-5?
  source_tables: research/04_etf_institutional_flows/tables/etf_lag_response.csv; research/04_etf_institutional_flows/tables/etf_pre_inception_plot_audit.csv
  chart_type: lag_response_with_bootstrap_interval
  units: correlation and bootstrap interval
  caption: ETF flow intensity is reported as a lag-response market-plumbing diagnostic.
  caveat: Timing and simultaneity limit interpretation.
  svg_required: true
  readme_section: selected-analytical-results
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: relative_asset_factor_structure
  filename: research/08_relative_asset_risk_factor_structure/figures/08_common_idiosyncratic_risk_decomposition.png
  status: public
  research_question: How much selected-major risk is common crypto factor versus idiosyncratic?
  source_tables: research/08_relative_asset_risk_factor_structure/tables/relative_factor_decomposition.csv; research/08_relative_asset_risk_factor_structure/tables/downside_expected_shortfall.csv
  chart_type: common_idiosyncratic_risk_decomposition
  units: variance share
  caption: Selected-major matched-window risk separates common and idiosyncratic components.
  caveat: Current-cohort and short-history caveats limit historical interpretation.
  svg_required: true
  readme_section: selected-analytical-results
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: data_governance_inventory
  filename: research/00_data_measurement_foundation/figures/data_governance_inventory.png
  status: module
  research_question: Which local provider and feature dispositions govern public claims?
  source_tables: research/00_data_measurement_foundation/tables/provider_inventory.csv; research/00_data_measurement_foundation/tables/feature_usage_matrix.csv
  chart_type: governance_inventory_bar
  units: counts
  caption: Provider and feature dispositions define release and measurement boundaries.
  caveat: Release-risk labels are not legal permission.
  svg_required: true
  readme_section: module
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: liquidity_state_correlations
  filename: research/05_stablecoin_defi_liquidity/figures/liquidity_state_correlations.png
  status: module
  research_question: Which liquidity-state correlations are most valuation-sensitive?
  source_tables: research/05_stablecoin_defi_liquidity/tables/liquidity_associations.csv; research/05_stablecoin_defi_liquidity/tables/valuation_contamination_audit.csv
  chart_type: state_correlation_with_measurement_risk
  units: weekly correlations
  caption: Liquidity-state correlations are strongest where USD TVL has valuation content.
  caveat: Endogenous state proxy, not liquidity-shock evidence.
  svg_required: true
  readme_section: module
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: measurement_mvrv_mechanics
  filename: research/06_onchain_valuation_holder_behavior/figures/measurement_mvrv_mechanics.png
  status: appendix
  research_question: How mechanical is same-day MVRV relative to BTC returns?
  source_tables: research/06_onchain_valuation_holder_behavior/tables/mvrv_mechanical_link_audit.csv; research/06_onchain_valuation_holder_behavior/tables/mvrv_identity_points.csv
  chart_type: measurement_decomposition
  units: log returns and next-week state means
  caption: MVRV same-day mechanics are a measurement warning.
  caveat: Same-day MVRV is not an independent primary factor.
  svg_required: true
  readme_section: appendix
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: chain_panel_coverage
  filename: research/07_chain_fundamentals_sector_dynamics/figures/chain_panel_coverage.png
  status: module
  research_question: Which chains have enough metric-family coverage for descriptive panel work?
  source_tables: research/07_chain_fundamentals_sector_dynamics/tables/chain_fundamental_panel_summary.csv
  chart_type: coverage_readiness_bar
  units: adequate metric families and median observations
  caption: Chain-fundamental evidence is coverage-first.
  caveat: Coverage does not establish a relationship claim.
  svg_required: true
  readme_section: module
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: appendix_event_response_matrix
  filename: research/09_event_stress_cross_module_synthesis/figures/appendix_event_response_matrix.png
  status: appendix
  research_question: How do registered event windows compare across BTC and ETH?
  source_tables: research/09_event_stress_cross_module_synthesis/tables/event_response_matrix.csv; research/09_event_stress_cross_module_synthesis/tables/event_inference.csv
  chart_type: event_placebo_response
  units: +1 to +10 event-window returns
  caption: Event responses remain appendix sensitivity diagnostics.
  caveat: No event-causal identification.
  svg_required: true
  readme_section: appendix
  visual_qa_status: pass_local_png_full_and_readme_width_svg_xml
- figure_id: synthesis_claim_source_depth
  filename: research/09_event_stress_cross_module_synthesis/figures/synthesis_claim_source_depth.png
  status: module
  research_question: How much claim and source-table evidence does each module contribute?
  source_tables: research/09_event_stress_cross_module_synthesis/tables/evidence_ledger.csv; research/09_event_stress_cross_module_synthesis/tables/robustness_summary.csv; research/09_event_stress_cross_module_synthesis/tables/claim_inventory.csv
